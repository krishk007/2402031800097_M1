<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variable declaration</title>
</head>
<body>
    <h2>Java script variable</h2>
    <p id="demo">In this example x,y,z are variables</p>
    <p id="demo1">In this example x,y,z are variables</p>
    <p id="demo2">In this example x,y,z are variables</p>
    <p id="demo3">In this example x,y,z are variables</p>
    <script>
        

        var x=5;
        var y=6;
        var c = x+y;
        var d = x-y;
        var e = x*y;
        var f = x/y;
        document.getElementById("demo").innerHTML="value of c is:"+c
        document.getElementById("demo1").innerHTML="value of d is:"+d
        document.getElementById("demo2").innerHTML="value of e is:"+e
        document.getElementById("demo3").innerHTML="value of f is:"+f

        
    </script>
</body>
</html>
