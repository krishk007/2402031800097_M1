<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ordered list example</title>
</head>
<body>
    <h1>Ordered list</h1>
    <ol>
        <li>Item one</li>
        <li>Item two</li>
        <ol type="I">
            <li> Item three</li>
            <li> Item four</li>
            <ol type="i">
                <li> Item five</li>
                <li> Item six</li>
                <ol type="A">
                    <li> Item seven</li>
                    <li> Item eight</li>
                    <ol type="a">
                    <li> Item nine</li>
                    <li> Item ten</li>
                </ol>
            </ol>
        </ol>
    </ol>
</body>
</html>
